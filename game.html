<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- this is the game page -->
    <title>Flying box-Mini Game</title>
    <link rel="stylesheet" href="main.css">
    <script src="code.js" defer></script> 
    
</head>
<!-- the game well starts when you load the page -->
<body onload="startGame()">

    <h1 id="heading">Welcome to Gameing box!</h1>
    <!-- i made a new menu where all the other pages are linked -->
      <ul>
  <li><a href="index.html">Home Page</a></li>
  <li><a href="boards.html">Boards Page</a></li>
  <li><a href="game.html">Game Page</a></li>
  <li><a href="strings.html">Strings Page</a></li>
</ul>   
<hr>

<!-- so this is the button to change the heading text -->
    <button onclick="updateText()">Change Heading Text</button>
    <!-- xiomara 4/27/2026 -->
    <br>
    <!-- this is audio you can play when playing the game -->
    <audio controls>
    <!-- This connects the sound file to the audio player -->
    <source src="851901__josefpres__piano-loops-206-efect-octave-long-loop-120-bpm.wav" type="audio/mpeg">
</audio>
    <div id="game-container"></div>    
  
    <!-- game  controls -->
     <!-- every move has its own function -->
<div style="text-align: center; margin-top: 20px;">
  <button onmousedown="moveup()" onmouseup="clearmove()" ontouchstart="moveup()">UP</button><br><br>
  <button onmousedown="moveleft()" onmouseup="clearmove()" ontouchstart="moveleft()">LEFT</button>
  <button onmousedown="moveright()" onmouseup="clearmove()" ontouchstart="moveright()">RIGHT</button><br><br>
  <button onmousedown="movedown()" onmouseup="clearmove()" ontouchstart="movedown()">DOWN</button>
  <!-- this will be the reset button it well start the game over -->
  <button onclick="resetGame()">Reset Game</button>
</div>
<hr>
</body>
</html>
